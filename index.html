<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประชาสัมพันธ์ภารกิจพิธีการศพที่ได้รับพระราชทาน</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #1a365d; }
        p { font-size: 18px; line-height: 1.6; color: #333; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>การประชาสัมพันธ์สร้างการรับรู้เกี่ยวกับภารกิจพิธีการศพที่ได้รับพระราชทาน</h1>
        <hr>
        <p>ยินดีต้อนรับสู่หน้าเว็บไซต์ประชาสัมพันธ์ข้อมูลข่าวสารและการสร้างการรับรู้เกี่ยวกับภารกิจพิธีการศพที่ได้รับพระราชทานอย่างเป็นทางการ</p>
        <!-- คุณสามารถเพิ่มข้อความหรือรายละเอียดเพิ่มเติมตรงส่วนนี้ได้เลยครับ -->
    </div>
</body>
</html>
